name: CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run smoke

  deploy:
    name: Deploy
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: globaltrace-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate Wrangler CI config
        run: node scripts/write-ci-wrangler-config.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GLOBALTRACE_HOSTNAME: ${{ secrets.GLOBALTRACE_HOSTNAME }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config .wrangler-ci.jsonc
          secrets: |
            NXTRACE_API_V4_TOKEN
            TURNSTILE_SECRET_KEY
        env:
          NXTRACE_API_V4_TOKEN: ${{ secrets.NXTRACE_API_V4_TOKEN }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Smoke deployed Worker
        run: |
          set -euo pipefail
          curl -fsSI -o /dev/null "https://${GLOBALTRACE_HOSTNAME}/"
          curl -fsSL "https://${GLOBALTRACE_HOSTNAME}/api/config" | node -e '
            let input = "";
            process.stdin.on("data", (chunk) => { input += chunk; });
            process.stdin.on("end", () => {
              const body = JSON.parse(input);
              if (!body.turnstileSiteKey || !body.mapStyleUrl) {
                throw new Error("api/config missing expected fields");
              }
              console.log("api/config ok");
            });
          '
        env:
          GLOBALTRACE_HOSTNAME: ${{ secrets.GLOBALTRACE_HOSTNAME }}
